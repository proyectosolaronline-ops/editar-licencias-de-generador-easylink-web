<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor de Licencias - LandingKit</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
    .container { max-width: 1000px; margin: auto; background: white; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); overflow: hidden; }
    header { background: #6366f1; color: white; padding: 15px; text-align: center; }
    .section { padding: 20px; }
    input, select, button { padding: 10px; margin: 5px; border-radius: 6px; border: 1px solid #ccc; }
    button { background: #6366f1; color: white; border: none; cursor: pointer; }
    button:hover { background: #4f46e5; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #f8f9fa; }
    .hidden { display: none; }
    .modal { 
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.6); align-items: center; justify-content: center;
    }
    .modal-content { background: white; padding: 20px; border-radius: 10px; width: 380px; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>Editor de Licencias</h1>
  </header>

  <!-- Login -->
  <div id="loginSection" class="section">
    <input type="email" id="email" placeholder="Correo administrador" value="proyectosolaronline@gmail.com" style="width:80%">
    <button onclick="sendCode()">Enviar Código</button>

    <div id="codeArea" style="margin-top:15px;" class="hidden">
      <input type="text" id="code" placeholder="Código de 8 caracteres" maxlength="8" style="width:200px; text-align:center">
      <button onclick="login()">Verificar</button>
    </div>
  </div>

  <!-- Tabla principal -->
  <div id="mainSection" class="section hidden">
    <div style="margin-bottom:10px;">
      <input type="text" id="buscar" placeholder="Buscar..." onkeyup="filtrar()" style="width:60%">
      <button onclick="cargarTiendas()">Actualizar</button>
      <button onclick="logout()" style="background:#ef4444">Salir</button>
    </div>

    <table id="tabla">
      <thead>
        <tr>
          <th>Tienda</th>
          <th>Dueño</th>
          <th>Plan</th>
          <th>Expira</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- Modal editar -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Editar Licencia</h2>
    <input type="hidden" id="storeId">

    <p><strong>Plan:</strong></p>
    <select id="plan" style="width:100%">
      <option value="free">Free</option>
      <option value="light">Light</option>
      <option value="standard">Standard</option>
      <option value="full">Full</option>
    </select>

    <p><strong>Fecha de expiración:</strong></p>
    <input type="date" id="fecha" style="width:100%">

    <div style="margin-top:20px">
      <button onclick="guardar()" style="background:#16a34a">Guardar</button>
      <button onclick="cerrarModal()" style="background:#888">Cancelar</button>
    </div>
  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxrdW7sLSiJNq_XF_xDjDgBl2rJppwwoRsEe-mNE8G-2BWOcI7DpyJpQYsyN8M-x-I/exec";

let token = "";

async function post(payload) {
  const r = await fetch(WEB_APP_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  });
  return r.json();
}

async function sendCode() {
  const email = document.getElementById("email").value.trim();
  if (!email) return alert("Ingresa el correo");

  const data = await post({ action: "admin.request.code", email });
  if (data.ok) {
    alert("Código enviado a tu correo");
    document.getElementById("codeArea").classList.remove("hidden");
  } else {
    alert(data.error || "Error al enviar código");
  }
}

async function login() {
  const code = document.getElementById("code").value.trim();
  const email = document.getElementById("email").value.trim();

  const data = await post({ action: "admin.verify.code", email, code });
  if (data.ok) {
    token = data.token;
    document.getElementById("loginSection").classList.add("hidden");
    document.getElementById("mainSection").classList.remove("hidden");
    cargarTiendas();
  } else {
    alert(data.error || "Código inválido");
  }
}

async function cargarTiendas() {
  const tbody = document.querySelector("#tabla tbody");
  tbody.innerHTML = "<tr><td colspan='5' style='text-align:center'>Cargando...</td></tr>";

  const data = await post({ action: "admin.stores.list", token });
  if (!data.ok) return alert(data.error || "Error");

  tbody.innerHTML = "";
  data.stores.forEach(s => {
    const exp = s.licenseExpiry ? new Date(s.licenseExpiry).toLocaleDateString("es-MX") : "—";
    const fila = document.createElement("tr");
    fila.innerHTML = `
      <td>${s.name}</td>
      <td>${s.ownerEmail}</td>
      <td>${s.plan ? s.plan.toUpperCase() : ""}</td>
      <td>${exp}</td>
      <td><button onclick="editar('${s.storeId}', '${s.plan}', '${s.licenseExpiry ? s.licenseExpiry.split('T')[0] : ''}')">Editar</button></td>
    `;
    tbody.appendChild(fila);
  });
}

function editar(storeId, plan, fecha) {
  document.getElementById("storeId").value = storeId;
  document.getElementById("plan").value = plan || "light";
  document.getElementById("fecha").value = fecha;
  document.getElementById("modal").style.display = "flex";
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}

async function guardar() {
  const storeId = document.getElementById("storeId").value;
  const plan = document.getElementById("plan").value;
  let fecha = document.getElementById("fecha").value;

  if (!fecha) return alert("Elige una fecha");

  fecha += "T23:59:59Z";

  const data = await post({
    action: "admin.license.set",
    token: token,
    storeId: storeId,
    plan: plan,
    expiryDate: fecha
  });

  if (data.ok) {
    alert("Licencia actualizada");
    cerrarModal();
    cargarTiendas();
  } else {
    alert(data.error || "Error al guardar");
  }
}

function filtrar() {
  const texto = document.getElementById("buscar").value.toLowerCase();
  const filas = document.querySelectorAll("#tabla tbody tr");
  filas.forEach(f => {
    f.style.display = f.textContent.toLowerCase().includes(texto) ? "" : "none";
  });
}

function logout() {
  if (confirm("¿Cerrar sesión?")) location.reload();
}
</script>

</body>
</html>
