<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Config Planes - LandingKit</title>
  <style>
    :root { --primary: #6366f1; }
    * { box-sizing: border-box; margin:0; padding:0; }
    body { 
      font-family: Arial, sans-serif; 
      background: #f4f4f4; 
      line-height: 1.5;
    }
    .container { 
      max-width: 100%; 
      margin: 0 auto; 
      background: white; 
      min-height: 100vh; 
    }
    header { 
      background: var(--primary); 
      color: white; 
      padding: 16px; 
      text-align: center; 
      font-size: 1.4rem; 
      font-weight: bold;
    }
    .section { padding: 16px; }
    input, select, button { 
      width: 100%; 
      padding: 12px; 
      margin: 8px 0; 
      border-radius: 8px; 
      border: 1px solid #ccc; 
      font-size: 16px;
    }
    button { 
      background: var(--primary); 
      color: white; 
      border: none; 
      cursor: pointer; 
      font-weight: bold; 
    }
    button:hover { background: #4f46e5; }
    .btn-success { background: #16a34a; }
    .btn-danger { background: #ef4444; }

    .table-wrapper { 
      overflow-x: auto; 
      -webkit-overflow-scrolling: touch; 
      margin: 15px 0;
    }
    table { 
      width: 100%; 
      border-collapse: collapse; 
      min-width: 850px;
    }
    th, td { 
      padding: 12px 8px; 
      border: 1px solid #ddd; 
      text-align: center; 
    }
    th { 
      background: #e0e7ff; 
      position: sticky; 
      top: 0; 
      z-index: 10; 
    }
    .hidden { display: none; }
    #status { 
      padding: 14px; 
      border-radius: 8px; 
      margin: 15px 0; 
      text-align: center; 
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <header>Configuración de Planes</header>

  <!-- LOGIN -->
  <div id="loginSection" class="section">
    <input type="email" id="email" value="proyectosolaronline@gmail.com" placeholder="Correo administrador">
    <button onclick="enviarCodigo()">Enviar Código por Email</button>

    <div id="codeSection" class="hidden">
      <input type="text" id="codigo" maxlength="8" placeholder="Código de 8 caracteres" style="text-align:center; font-size:18px;">
      <button onclick="verificarCodigo()">Entrar</button>
    </div>
  </div>

  <!-- TABLA PRINCIPAL -->
  <div id="mainSection" class="section hidden">
    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px;">
      <button onclick="cargarPlanes()">Actualizar Tabla</button>
      <button onclick="guardarTodo()" class="btn-success">Guardar Cambios</button>
      <button onclick="location.reload()" class="btn-danger">Cerrar Sesión</button>
    </div>

    <div class="table-wrapper">
      <table id="tabla">
        <thead>
          <tr>
            <th>Plan</th>
            <th>Label</th>
            <th>Max Prod</th>
            <th>Max Pedidos</th>
            <th>Max Clientes</th>
            <th>Max Promos</th>
            <th>Pedidos</th>
            <th>Clientes</th>
            <th>Mayorista</th>
            <th>Promos</th>
            <th>Catalog Only</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="status"></div>
  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxrdW7sLSiJNq_XF_xDjDgBl2rJppwwoRsEe-mNE8G-2BWOcI7DpyJpQYsyN8M-x-I/exec";

let tokenActual = "";

// Función para hacer peticiones
async function enviarPeticion(datos) {
  try {
    const res = await fetch(WEB_APP_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(datos)
    });
    return await res.json();
  } catch (e) {
    return { ok: false, error: "Error de conexión con el servidor" };
  }
}

// ==================== LOGIN ====================
async function enviarCodigo() {
  const email = document.getElementById("email").value.trim();
  if (!email) return alert("Ingresa tu correo");

  const data = await enviarPeticion({ action: "admin.request.code", email: email });

  if (data.ok) {
    alert("✅ Código enviado a tu correo.\nRevisa también la carpeta de Spam.");
    document.getElementById("codeSection").classList.remove("hidden");
  } else {
    alert(data.error || "No se pudo enviar el código");
  }
}

async function verificarCodigo() {
  const email = document.getElementById("email").value.trim();
  const codigo = document.getElementById("codigo").value.trim().toUpperCase();

  if (codigo.length < 8) return alert("El código debe tener 8 caracteres");

  const data = await enviarPeticion({ 
    action: "admin.verify.code", 
    email: email, 
    code: codigo 
  });

  if (data.ok) {
    tokenActual = data.token;
    document.getElementById("loginSection").classList.add("hidden");
    document.getElementById("mainSection").classList.remove("hidden");
    cargarPlanes();
  } else {
    alert(data.error || "Código incorrecto o expirado");
  }
}

// ==================== CARGAR Y GUARDAR PLANES ====================
async function cargarPlanes() {
  const tbody = document.querySelector("#tabla tbody");
  tbody.innerHTML = `<tr><td colspan="11" style="padding:40px;color:#666;">Cargando planes...</td></tr>`;

  // Aseguramos que la hoja exista
  await enviarPeticion({ action: "admin.config.planes", token: tokenActual });

  const planes = [
    {plan:"free", label:"Free (Trial)", maxProducts:10, maxOrders:5, maxCustomers:10, maxPromos:1, allowOrders:true, allowCustomers:true, allowMayorista:false, allowPromos:true, catalogOnly:false},
    {plan:"light", label:"Light", maxProducts:30, maxOrders:30, maxCustomers:50, maxPromos:2, allowOrders:true, allowCustomers:true, allowMayorista:false, allowPromos:true, catalogOnly:false},
    {plan:"standard", label:"Standard", maxProducts:100, maxOrders:200, maxCustomers:300, maxPromos:5, allowOrders:true, allowCustomers:true, allowMayorista:false, allowPromos:true, catalogOnly:false},
    {plan:"full", label:"Full", maxProducts:9999, maxOrders:9999, maxCustomers:9999, maxPromos:999, allowOrders:true, allowCustomers:true, allowMayorista:true, allowPromos:true, catalogOnly:false}
  ];

  let html = "";
  planes.forEach(p => {
    html += `
      <tr>
        <td><b>${p.plan}</b></td>
        <td><input type="text" value="${p.label}" data-plan="${p.plan}" data-campo="label"></td>
        <td><input type="number" value="${p.maxProducts}" data-plan="${p.plan}" data-campo="maxProducts"></td>
        <td><input type="number" value="${p.maxOrders}" data-plan="${p.plan}" data-campo="maxOrders"></td>
        <td><input type="number" value="${p.maxCustomers}" data-plan="${p.plan}" data-campo="maxCustomers"></td>
        <td><input type="number" value="${p.maxPromos}" data-plan="${p.plan}" data-campo="maxPromos"></td>
        <td><select data-plan="${p.plan}" data-campo="allowOrders"><option value="true" ${p.allowOrders?'selected':''}>Sí</option><option value="false" ${!p.allowOrders?'selected':''}>No</option></select></td>
        <td><select data-plan="${p.plan}" data-campo="allowCustomers"><option value="true" ${p.allowCustomers?'selected':''}>Sí</option><option value="false" ${!p.allowCustomers?'selected':''}>No</option></select></td>
        <td><select data-plan="${p.plan}" data-campo="allowMayorista"><option value="true" ${p.allowMayorista?'selected':''}>Sí</option><option value="false" ${!p.allowMayorista?'selected':''}>No</option></select></td>
        <td><select data-plan="${p.plan}" data-campo="allowPromos"><option value="true" ${p.allowPromos?'selected':''}>Sí</option><option value="false" ${!p.allowPromos?'selected':''}>No</option></select></td>
        <td><select data-plan="${p.plan}" data-campo="catalogOnly"><option value="true" ${p.catalogOnly?'selected':''}>Sí</option><option value="false" ${!p.catalogOnly?'selected':''}>No</option></select></td>
      </tr>`;
  });
  tbody.innerHTML = html;
}

async function guardarTodo() {
  const status = document.getElementById("status");
  status.style.background = "#fef3c7";
  status.style.color = "#b45309";
  status.textContent = "Guardando cambios en config_planes...";

  const rows = document.querySelectorAll("#tabla tbody tr");
  const planes = [];

  rows.forEach(row => {
    const planData = { plan: row.cells[0].textContent.trim() };
    const inputs = row.querySelectorAll("input, select");
    
    inputs.forEach(el => {
      const campo = el.dataset.campo;
      let valor = el.value;
      if (el.tagName === "SELECT") valor = valor === "true";
      if (campo && campo.startsWith("max")) valor = Number(valor) || 0;
      if (campo) planData[campo] = valor;
    });
    planes.push(planData);
  });

  const resultado = await enviarPeticion({
    action: "admin.config_planes.save",
    token: tokenActual,
    planes: planes
  });

  if (resultado.ok) {
    status.style.background = "#d1fae5";
    status.style.color = "#166534";
    status.textContent = "✅ Cambios guardados correctamente en la hoja config_planes";
  } else {
    status.style.background = "#fee2e2";
    status.style.color = "#b91c1c";
    status.textContent = "❌ Error: " + (resultado.error || "No se pudo guardar");
  }
}
</script>

</body>
</html>
