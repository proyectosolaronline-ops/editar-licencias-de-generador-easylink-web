<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LandingKit - Editor de Licencias</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; margin: 0; padding: 20px; }
    .container { max-width: 1100px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
    header { background: #6366f1; color: white; padding: 20px; text-align: center; }
    h1 { margin: 0; font-size: 24px; }
    .card { padding: 40px 20px; text-align: center; }
    input, select, button {
      padding: 12px 16px;
      margin: 8px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      background: #6366f1;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #4f46e5; }
    .hidden { display: none; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 14px; text-align: left; border-bottom: 1px solid #e2e8f0; }
    th { background: #f8fafc; font-weight: 600; }
    .status-active { color: #16a34a; font-weight: bold; }
    .status-suspended { color: #ef4444; font-weight: bold; }
    .modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      align-items: center; justify-content: center;
    }
    .modal-content {
      background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 420px;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Login Screen -->
  <div id="loginScreen" class="card">
    <h1>🔑 Editor de Licencias</h1>
    <p>LandingKit - Panel Maestro</p>
    
    <input type="email" id="adminEmail" placeholder="Tu correo de administrador" style="width:85%; max-width:320px;" value="proyectosolaronline@gmail.com">
    <br><br>
    <button onclick="requestCode()" style="padding:12px 30px;">Enviar Código por Correo</button>
    
    <div id="codeSection" class="hidden" style="margin-top:25px;">
      <input type="text" id="adminCode" placeholder="Código de 8 caracteres" maxlength="8" 
             style="width:220px; text-align:center; font-size:20px; letter-spacing:6px;">
      <br><br>
      <button onclick="verifyCode()" style="padding:12px 30px;">Verificar Código</button>
      <button onclick="backToLogin()" style="background:#64748b; padding:12px 20px;">Cancelar</button>
    </div>
  </div>

  <!-- Main Screen -->
  <div id="mainScreen" class="hidden">
    <header>
      <h1>Editor de Licencias - LandingKit</h1>
      <p id="adminInfo" style="margin:5px 0 0 0; opacity:0.9;"></p>
    </header>

    <div style="padding:15px 20px; background:#f1f5f9; display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
      <input type="text" id="search" placeholder="Buscar por nombre o email..." onkeyup="filterTable()" 
             style="flex:1; min-width:250px;">
      <button onclick="loadStores()">Actualizar Lista</button>
      <button onclick="logout()" style="background:#ef4444;">Cerrar Sesión</button>
    </div>

    <table id="storesTable">
      <thead>
        <tr>
          <th>Tienda</th>
          <th>Dueño</th>
          <th>Plan</th>
          <th>Expira</th>
          <th>Estado</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- Modal Editar -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <h2>Editar Licencia</h2>
    <input type="hidden" id="editStoreId">

    <div class="form-group">
      <label><strong>Plan:</strong></label>
      <select id="editPlan" style="width:100%;">
        <option value="free">Free (Trial)</option>
        <option value="light">Light</option>
        <option value="standard">Standard</option>
        <option value="full">Full</option>
      </select>
    </div>

    <div class="form-group">
      <label><strong>Fecha de Expiración:</strong></label>
      <input type="date" id="editExpiry" style="width:100%;">
    </div>

    <div style="margin-top:25px; display:flex; gap:10px;">
      <button onclick="saveLicense()" style="flex:1; background:#16a34a; padding:14px;">Guardar Cambios</button>
      <button onclick="closeModal()" style="flex:1; background:#64748b; padding:14px;">Cancelar</button>
    </div>
  </div>
</div>

<script>
// ==================== TU URL YA INTEGRADA ====================
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxrdW7sLSiJNq_XF_xDjDgBl2rJppwwoRsEe-mNE8G-2BWOcI7DpyJpQYsyN8M-x-I/exec";

let currentToken = null;
let currentAdminEmail = '';

async function postData(payload) {
  const res = await fetch(WEB_APP_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  return await res.json();
}

// ==================== LOGIN ====================
async function requestCode() {
  const email = document.getElementById('adminEmail').value.trim();
  if (!email) return alert("Ingresa tu correo");

  try {
    const data = await postData({ action: 'admin.request.code', email: email });
    if (data.ok) {
      alert(`✅ Código enviado a: ${email}\n\nRevisa tu correo (revisa también spam)`);
      document.getElementById('codeSection').classList.remove('hidden');
      currentAdminEmail = email;
    } else {
      alert("Error: " + (data.error || "No se pudo enviar el código"));
    }
  } catch(e) {
    alert("Error de conexión. Verifica que la Web App esté desplegada correctamente.");
  }
}

async function verifyCode() {
  const code = document.getElementById('adminCode').value.trim().toUpperCase();
  if (code.length < 8) return alert("Ingresa el código de 8 caracteres");

  try {
    const data = await postData({ 
      action: 'admin.verify.code', 
      email: currentAdminEmail, 
      code: code 
    });

    if (data.ok) {
      currentToken = data.token;
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainScreen').classList.remove('hidden');
      document.getElementById('adminInfo').textContent = `Conectado como: ${currentAdminEmail}`;
      loadStores();
    } else {
      alert("Código incorrecto o expirado");
    }
  } catch(e) {
    alert("Error de conexión");
  }
}

function backToLogin() {
  document.getElementById('codeSection').classList.add('hidden');
}

// ==================== TABLA DE TIENDAS ====================
async function loadStores() {
  if (!currentToken) return;

  const tbody = document.querySelector('#storesTable tbody');
  tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:60px;color:#666;">Cargando tiendas...</td></tr>';

  try {
    const data = await postData({ action: 'admin.stores.list', token: currentToken });
    if (!data.ok) throw new Error(data.error || "Error desconocido");
    renderTable(data.stores || []);
  } catch (err) {
    alert("Error al cargar tiendas: " + err.message);
  }
}

function renderTable(stores) {
  const tbody = document.querySelector('#storesTable tbody');
  tbody.innerHTML = '';

  stores.forEach(store => {
    const expiry = store.licenseExpiry ? new Date(store.licenseExpiry) : null;
    const isExpired = expiry && expiry < new Date();

    const row = document.createElement('tr');
    row.innerHTML = `
      <td><strong>${store.name}</strong><br><small>${store.slug || ''}</small></td>
      <td>${store.ownerEmail}</td>
      <td><strong>${(store.plan || 'light').toUpperCase()}</strong></td>
      <td>${expiry ? expiry.toLocaleDateString('es-MX') : '—'} 
          ${isExpired ? '<br><span style="color:#ef4444">Expirada</span>' : ''}</td>
      <td><span class="${store.status === 'active' ? 'status-active' : 'status-suspended'}">
        ${store.status === 'active' ? 'Activa' : 'Suspendida'}
      </span></td>
      <td>
        <button onclick="openEditModal('${store.storeId}', '${store.plan || "light"}', '${expiry ? expiry.toISOString().split("T")[0] : ""}')" 
                style="padding:8px 16px;">Editar Licencia</button>
      </td>
    `;
    tbody.appendChild(row);
  });
}

function openEditModal(storeId, plan, expiry) {
  document.getElementById('editStoreId').value = storeId;
  document.getElementById('editPlan').value = plan;
  document.getElementById('editExpiry').value = expiry;
  document.getElementById('editModal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('editModal').style.display = 'none';
}

async function saveLicense() {
  const storeId = document.getElementById('editStoreId').value;
  const plan = document.getElementById('editPlan').value;
  let expiry = document.getElementById('editExpiry').value;

  if (!expiry) return alert("Selecciona una fecha de expiración");

  expiry += 'T23:59:59.999Z';

  try {
    const data = await postData({
      action: 'admin.license.set',
      token: currentToken,
      storeId: storeId,
      plan: plan,
      expiryDate: expiry
    });

    if (data.ok) {
      alert("✅ Licencia actualizada correctamente");
      closeModal();
      loadStores();
    } else {
      alert("Error: " + (data.error || "Desconocido"));
    }
  } catch(e) {
    alert("Error de conexión al guardar");
  }
}

function filterTable() {
  const term = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('#storesTable tbody tr').forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(term) ? '' : 'none';
  });
}

function logout() {
  if (confirm("¿Cerrar sesión?")) location.reload();
}

// Iniciar
window.onload = () => {
  // Puedes cambiar el email por defecto si quieres
};
</script>
</body>
</html>
