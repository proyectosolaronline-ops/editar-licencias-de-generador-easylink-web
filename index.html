<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LandingKit - Editor de Licencias</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f8fafc;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    header {
      background: #6366f1;
      color: white;
      padding: 20px;
      text-align: center;
    }
    h1 { margin: 0; font-size: 24px; }
    .controls {
      padding: 20px;
      background: #f1f5f9;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    input, select, button {
      padding: 10px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
    }
    button {
      background: #6366f1;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #4f46e5; }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
    }
    th {
      background: #f8fafc;
      font-weight: 600;
      color: #475569;
    }
    tr:hover { background: #f8fafc; }
    .status-active { color: #16a34a; font-weight: bold; }
    .status-suspended { color: #ef4444; font-weight: bold; }
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 90%;
      max-width: 420px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>LandingKit – Editor de Licencias v3.4</h1>
    <p>Gestión de planes y fechas de expiración</p>
  </header>

  <div class="controls">
    <input type="text" id="search" placeholder="Buscar por nombre o email..." onkeyup="filterTable()">
    <select id="planFilter" onchange="filterTable()">
      <option value="">Todos los planes</option>
      <option value="free">Free (Trial)</option>
      <option value="light">Light</option>
      <option value="standard">Standard</option>
      <option value="full">Full</option>
    </select>
    <button onclick="loadStores()">Actualizar Lista</button>
  </div>

  <table id="storesTable">
    <thead>
      <tr>
        <th>Tienda</th>
        <th>Dueño</th>
        <th>Plan Actual</th>
        <th>Expira</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- Modal para editar licencia -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <h2>Editar Licencia</h2>
    <input type="hidden" id="editStoreId">

    <div class="form-group">
      <label>Plan</label>
      <select id="editPlan">
        <option value="free">Free (Trial)</option>
        <option value="light">Light</option>
        <option value="standard">Standard</option>
        <option value="full">Full</option>
      </select>
    </div>

    <div class="form-group">
      <label>Fecha de Expiración</label>
      <input type="date" id="editExpiry">
    </div>

    <div style="display:flex; gap:10px; margin-top:20px;">
      <button onclick="saveLicense()" style="flex:1; background:#16a34a;">Guardar Cambios</button>
      <button onclick="closeModal()" style="flex:1; background:#64748b;">Cancelar</button>
    </div>
  </div>
</div>

<script>
// ==================== CONFIGURA AQUÍ TU WEB APP URL ====================
const WEB_APP_URL = 'https://script.google.com/macros/s/TU_DEPLOY_ID/exec'; 
// Cambia esto por la URL de tu Web App desplegada como "Ejecutar como: Yo" y "Acceso: Cualquiera"

let currentToken = ''; // Pon aquí tu token de admin (puedes agregarlo manualmente o con un login)

async function loadStores() {
  if (!currentToken) {
    alert("Falta el token de administrador. Edita el código y pon tu token.");
    return;
  }

  const tbody = document.querySelector('#storesTable tbody');
  tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;">Cargando tiendas...</td></tr>';

  try {
    const res = await fetch(WEB_APP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'admin.stores.list',
        token: currentToken
      })
    });

    const data = await res.json();

    if (!data.ok) throw new Error(data.error || 'Error desconocido');

    renderTable(data.stores);

  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="6" style="color:red;text-align:center;padding:20px;">Error: ${err.message}</td></tr>`;
  }
}

function renderTable(stores) {
  const tbody = document.querySelector('#storesTable tbody');
  tbody.innerHTML = '';

  stores.forEach(store => {
    const config = store.config || {};
    const expiryDate = store.licenseExpiry ? new Date(store.licenseExpiry) : null;
    const isExpired = expiryDate && expiryDate < new Date();

    const row = document.createElement('tr');
    row.innerHTML = `
      <td><strong>${store.name}</strong><br><small>${store.slug}</small></td>
      <td>${store.ownerEmail}</td>
      <td><strong>${store.plan.toUpperCase()}</strong></td>
      <td>${expiryDate ? expiryDate.toLocaleDateString('es-MX') : 'Sin fecha'} 
          ${isExpired ? '<br><span style="color:#ef4444">¡Expirada!</span>' : ''}</td>
      <td><span class="${store.status === 'active' ? 'status-active' : 'status-suspended'}">
        ${store.status === 'active' ? 'Activa' : 'Suspendida'}
      </span></td>
      <td>
        <button onclick="openEditModal('${store.storeId}', '${store.plan}', '${store.licenseExpiry ? store.licenseExpiry.split('T')[0] : ''}')" 
                style="background:#6366f1; padding:8px 12px; font-size:13px;">
          Editar Licencia
        </button>
      </td>
    `;
    tbody.appendChild(row);
  });
}

function openEditModal(storeId, currentPlan, currentExpiry) {
  document.getElementById('editStoreId').value = storeId;
  document.getElementById('editPlan').value = currentPlan || 'light';
  document.getElementById('editExpiry').value = currentExpiry || '';
  document.getElementById('editModal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('editModal').style.display = 'none';
}

async function saveLicense() {
  const storeId = document.getElementById('editStoreId').value;
  const plan = document.getElementById('editPlan').value;
  const expiryDate = document.getElementById('editExpiry').value;

  if (!expiryDate) {
    alert("Por favor selecciona una fecha de expiración");
    return;
  }

  try {
    const res = await fetch(WEB_APP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'admin.license.set',
        token: currentToken,
        storeId: storeId,
        plan: plan,
        expiryDate: expiryDate + 'T23:59:59.999Z'   // final del día
      })
    });

    const data = await res.json();

    if (data.ok) {
      alert('Licencia actualizada correctamente');
      closeModal();
      loadStores();        // recargar lista
    } else {
      alert('Error: ' + (data.error || 'Desconocido'));
    }
  } catch (err) {
    alert('Error de conexión: ' + err.message);
  }
}

function filterTable() {
  const search = document.getElementById('search').value.toLowerCase();
  const planFilter = document.getElementById('planFilter').value;
  const rows = document.querySelectorAll('#storesTable tbody tr');

  rows.forEach(row => {
    const text = row.textContent.toLowerCase();
    const planCell = row.cells[2].textContent.toLowerCase();

    const matchSearch = text.includes(search);
    const matchPlan = !planFilter || planCell.includes(planFilter);

    row.style.display = (matchSearch && matchPlan) ? '' : 'none';
  });
}

// ==================== PON AQUÍ TU TOKEN DE ADMIN ====================
// Puedes ponerlo directamente aquí (temporal) o crear un pequeño login
currentToken = prompt("Ingresa tu Token de Administrador:", "") || currentToken;

// Cargar lista automáticamente al abrir
window.onload = () => {
  if (currentToken) loadStores();
};
</script>

</body>
</html>
