<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LandingKit - Editor de Licencias</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; margin: 0; padding: 20px; }
    .container { max-width: 1100px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
    header { background: #6366f1; color: white; padding: 20px; text-align: center; }
    h1 { margin: 0; font-size: 24px; }
    .card { padding: 30px; text-align: center; }
    input, select, button {
      padding: 12px 16px;
      margin: 8px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      background: #6366f1;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
      padding: 12px 24px;
    }
    button:hover { background: #4f46e5; }
    .hidden { display: none; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 14px; text-align: left; border-bottom: 1px solid #e2e8f0; }
    th { background: #f8fafc; }
    .status-active { color: #16a34a; font-weight: bold; }
    .status-suspended { color: #ef4444; font-weight: bold; }
    .modal {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); align-items: center; justify-content: center;
    }
    .modal-content {
      background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 420px;
    }
  </style>
</head>
<body>

<div class="container" id="mainContainer">

  <!-- Pantalla de Login -->
  <div id="loginScreen" class="card">
    <h1>🔑 Acceso Panel Maestro</h1>
    <p>Editor de Licencias - LandingKit</p>
    
    <input type="email" id="adminEmail" placeholder="Correo del administrador" style="width:80%; max-width:320px;">
    <br>
    <button onclick="requestCode()">Enviar Código por Correo</button>
    
    <div id="codeSection" class="hidden" style="margin-top:20px;">
      <input type="text" id="adminCode" placeholder="Código de 8 caracteres" maxlength="8" style="width:200px; text-align:center; font-size:18px; letter-spacing:4px;">
      <br>
      <button onclick="verifyCode()">Verificar Código</button>
      <button onclick="backToLogin()" style="background:#64748b;">Cancelar</button>
    </div>
  </div>

  <!-- Pantalla Principal (Tabla de Licencias) -->
  <div id="mainScreen" class="hidden">
    <header>
      <h1>Editor de Licencias</h1>
      <p id="adminInfo"></p>
    </header>

    <div style="padding:20px; background:#f1f5f9; display:flex; gap:10px; flex-wrap:wrap;">
      <input type="text" id="search" placeholder="Buscar tienda o email..." onkeyup="filterTable()" style="flex:1; min-width:200px;">
      <button onclick="loadStores()">Actualizar Lista</button>
      <button onclick="logout()" style="background:#ef4444;">Cerrar Sesión</button>
    </div>

    <table id="storesTable">
      <thead>
        <tr>
          <th>Tienda</th>
          <th>Dueño</th>
          <th>Plan</th>
          <th>Expira</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- Modal Editar Licencia -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <h2>Editar Licencia</h2>
    <input type="hidden" id="editStoreId">

    <div style="margin:15px 0;">
      <label>Plan:</label>
      <select id="editPlan" style="width:100%;">
        <option value="free">Free (Trial)</option>
        <option value="light">Light</option>
        <option value="standard">Standard</option>
        <option value="full">Full</option>
      </select>
    </div>

    <div style="margin:15px 0;">
      <label>Fecha de Expiración:</label>
      <input type="date" id="editExpiry" style="width:100%;">
    </div>

    <div style="display:flex; gap:10px; margin-top:25px;">
      <button onclick="saveLicense()" style="flex:1; background:#16a34a;">Guardar Cambios</button>
      <button onclick="closeModal()" style="flex:1; background:#64748b;">Cancelar</button>
    </div>
  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/TU_WEB_APP_ID/exec"; 
// ← Cambia esto por la URL real de tu Web App

let currentToken = null;
let currentAdminEmail = '';

async function requestCode() {
  const email = document.getElementById('adminEmail').value.trim();
  if (!email) return alert("Ingresa tu correo de administrador");

  try {
    const res = await fetch(WEB_APP_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ action: 'admin.request.code', email: email })
    });
    const data = await res.json();

    if (data.ok) {
      alert(`Código enviado a: ${email}\n\nRevisa tu correo (puede llegar a spam)`);
      document.getElementById('codeSection').classList.remove('hidden');
      currentAdminEmail = email;
    } else {
      alert("Error: " + (data.error || "No se pudo enviar el código"));
    }
  } catch(e) {
    alert("Error de conexión");
  }
}

async function verifyCode() {
  const code = document.getElementById('adminCode').value.trim().toUpperCase();
  if (code.length < 8) return alert("Ingresa el código completo");

  try {
    const res = await fetch(WEB_APP_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ 
        action: 'admin.verify.code', 
        email: currentAdminEmail, 
        code: code 
      })
    });
    const data = await res.json();

    if (data.ok) {
      currentToken = data.token;
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainScreen').classList.remove('hidden');
      document.getElementById('adminInfo').textContent = `Conectado como: ${currentAdminEmail}`;
      loadStores();
    } else {
      alert("Código incorrecto o expirado");
    }
  } catch(e) {
    alert("Error de conexión");
  }
}

function backToLogin() {
  document.getElementById('codeSection').classList.add('hidden');
}

async function loadStores() {
  if (!currentToken) return;

  const tbody = document.querySelector('#storesTable tbody');
  tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:50px;">Cargando tiendas...</td></tr>';

  try {
    const res = await fetch(WEB_APP_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ action: 'admin.stores.list', token: currentToken })
    });
    const data = await res.json();

    if (!data.ok) throw new Error(data.error);

    renderTable(data.stores || []);
  } catch (err) {
    alert("Error al cargar tiendas: " + err.message);
  }
}

function renderTable(stores) {
  const tbody = document.querySelector('#storesTable tbody');
  tbody.innerHTML = '';

  stores.forEach(s => {
    const expiry = s.licenseExpiry ? new Date(s.licenseExpiry) : null;
    const expired = expiry && expiry < new Date();

    const row = document.createElement('tr');
    row.innerHTML = `
      <td><b>${s.name}</b><br><small>${s.slug || ''}</small></td>
      <td>${s.ownerEmail}</td>
      <td><b>${s.plan ? s.plan.toUpperCase() : '—'}</b></td>
      <td>${expiry ? expiry.toLocaleDateString('es-MX') : '—'}
          ${expired ? '<br><span style="color:#ef4444">Expirada</span>' : ''}</td>
      <td><span class="${s.status === 'active' ? 'status-active' : 'status-suspended'}">
        ${s.status === 'active' ? 'Activa' : 'Suspendida'}
      </span></td>
      <td>
        <button onclick="openEditModal('${s.storeId}', '${s.plan || 'light'}', '${expiry ? expiry.toISOString().split('T')[0] : ''}')" 
                style="padding:8px 14px; font-size:13px;">Editar</button>
      </td>
    `;
    tbody.appendChild(row);
  });
}

function openEditModal(storeId, plan, expiry) {
  document.getElementById('editStoreId').value = storeId;
  document.getElementById('editPlan').value = plan;
  document.getElementById('editExpiry').value = expiry;
  document.getElementById('editModal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('editModal').style.display = 'none';
}

async function saveLicense() {
  const storeId = document.getElementById('editStoreId').value;
  const plan = document.getElementById('editPlan').value;
  let expiry = document.getElementById('editExpiry').value;

  if (!expiry) return alert("Selecciona una fecha de expiración");

  expiry += 'T23:59:59.999Z';   // final del día

  try {
    const res = await fetch(WEB_APP_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        action: 'admin.license.set',
        token: currentToken,
        storeId: storeId,
        plan: plan,
        expiryDate: expiry
      })
    });

    const data = await res.json();
    if (data.ok) {
      alert("Licencia actualizada correctamente");
      closeModal();
      loadStores();
    } else {
      alert("Error: " + (data.error || "Desconocido"));
    }
  } catch(e) {
    alert("Error de conexión");
  }
}

function filterTable() {
  const term = document.getElementById('search').value.toLowerCase();
  const rows = document.querySelectorAll('#storesTable tbody tr');
  rows.forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(term) ? '' : 'none';
  });
}

function logout() {
  if (confirm("¿Cerrar sesión?")) {
    location.reload();
  }
}

// Cambia esta URL por la de tu Web App
// const WEB_APP_URL = "https://script.google.com/macros/s/AKfyc.../exec";
</script>

</body>
</html>
