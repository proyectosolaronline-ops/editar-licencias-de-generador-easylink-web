<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuración de Planes - LandingKit</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
    .container { max-width: 1100px; margin: auto; background: white; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); overflow: hidden; }
    header { background: #6366f1; color: white; padding: 18px; text-align: center; font-size: 22px; }
    .section { padding: 20px; }
    input, select, button { padding: 10px; margin: 6px; border-radius: 6px; font-size: 15px; }
    button { background: #6366f1; color: white; border: none; cursor: pointer; }
    button:hover { background: #4f46e5; }
    .login-btn { padding: 12px 30px; }
    table { width: 100%; border-collapse: collapse; margin: 15px 0; }
    th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
    th { background: #6366f1; color: white; }
    input[type="number"] { width: 100px; }
    .hidden { display: none; }
    .status { padding: 12px; margin: 10px 0; border-radius: 6px; text-align: center; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <header>Configuración de Planes (config_planes)</header>

  <!-- Pantalla Login -->
  <div id="loginSection" class="section">
    <input type="email" id="adminEmail" placeholder="Correo del administrador" value="proyectosolaronline@gmail.com" style="width:280px;">
    <button onclick="requestCode()" class="login-btn">Enviar Código por Email</button>

    <div id="codeSection" class="hidden" style="margin-top:20px;">
      <input type="text" id="adminCode" placeholder="Código de 8 caracteres" maxlength="8" style="width:180px; text-align:center; font-size:18px;">
      <button onclick="verifyCode()" class="login-btn">Verificar Código</button>
      <button onclick="backToLogin()" style="background:#888;">Cancelar</button>
    </div>
  </div>

  <!-- Pantalla Principal -->
  <div id="mainSection" class="section hidden">
    <div style="margin-bottom:15px; text-align:right;">
      <button onclick="cargarPlanes()">Actualizar Tabla</button>
      <button onclick="guardarTodo()" style="background:#16a34a;">Guardar Cambios</button>
      <button onclick="logout()" style="background:#ef4444;">Cerrar Sesión</button>
    </div>

    <table id="planesTable">
      <thead>
        <tr>
          <th>Plan</th>
          <th>Nombre (Label)</th>
          <th>Max Productos</th>
          <th>Max Pedidos</th>
          <th>Max Clientes</th>
          <th>Max Promos</th>
          <th>Pedidos</th>
          <th>Clientes</th>
          <th>Mayorista</th>
          <th>Promos</th>
          <th>Catalog Only</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div id="status" class="status"></div>
  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxrdW7sLSiJNq_XF_xDjDgBl2rJppwwoRsEe-mNE8G-2BWOcI7DpyJpQYsyN8M-x-I/exec";

let currentToken = null;

// Función POST limpia
async function post(payload) {
  try {
    const res = await fetch(WEB_APP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    return await res.json();
  } catch(e) {
    console.error(e);
    return { ok: false, error: "Error de conexión" };
  }
}

// ====================== LOGIN ======================
async function requestCode() {
  const email = document.getElementById("adminEmail").value.trim();
  if (!email) return alert("Ingresa tu correo");

  const data = await post({ action: "admin.request.code", email: email });
  if (data.ok) {
    alert("Código enviado a tu correo. Revisa también la carpeta de Spam.");
    document.getElementById("codeSection").classList.remove("hidden");
  } else {
    alert(data.error || "No se pudo enviar el código");
  }
}

async function verifyCode() {
  const email = document.getElementById("adminEmail").value.trim();
  const code = document.getElementById("adminCode").value.trim().toUpperCase();

  if (code.length !== 8) return alert("El código debe tener 8 caracteres");

  const data = await post({ action: "admin.verify.code", email: email, code: code });

  if (data.ok) {
    currentToken = data.token;
    document.getElementById("loginSection").classList.add("hidden");
    document.getElementById("mainSection").classList.remove("hidden");
    cargarPlanes();
  } else {
    alert(data.error || "Código incorrecto o expirado");
  }
}

function backToLogin() {
  document.getElementById("codeSection").classList.add("hidden");
}

// ====================== PLANES ======================
async function cargarPlanes() {
  const tbody = document.querySelector("#planesTable tbody");
  tbody.innerHTML = "<tr><td colspan='11'>Cargando planes...</td></tr>";

  // Aseguramos que la hoja config_planes exista
  await post({ action: "admin.config.planes", token: currentToken });

  // Por ahora mostramos los planes por defecto (ya que no tienes acción para leer la hoja)
  const planesPorDefecto = [
    {plan:"free", label:"Free (Trial)", maxProducts:10, maxOrders:5, maxCustomers:10, maxPromos:1, allowOrders:true, allowCustomers:true, allowMayorista:false, allowPromos:true, catalogOnly:false},
    {plan:"light", label:"Light", maxProducts:30, maxOrders:30, maxCustomers:50, maxPromos:2, allowOrders:true, allowCustomers:true, allowMayorista:false, allowPromos:true, catalogOnly:false},
    {plan:"standard", label:"Standard", maxProducts:100, maxOrders:200, maxCustomers:300, maxPromos:5, allowOrders:true, allowCustomers:true, allowMayorista:false, allowPromos:true, catalogOnly:false},
    {plan:"full", label:"Full", maxProducts:9999, maxOrders:9999, maxCustomers:9999, maxPromos:999, allowOrders:true, allowCustomers:true, allowMayorista:true, allowPromos:true, catalogOnly:false}
  ];

  renderTabla(planesPorDefecto);
}

function renderTabla(planes) {
  const tbody = document.querySelector("#planesTable tbody");
  tbody.innerHTML = "";

  planes.forEach(p => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><strong>${p.plan}</strong></td>
      <td><input type="text" value="${p.label}" data-plan="${p.plan}" data-field="label"></td>
      <td><input type="number" value="${p.maxProducts}" data-plan="${p.plan}" data-field="maxProducts"></td>
      <td><input type="number" value="${p.maxOrders}" data-plan="${p.plan}" data-field="maxOrders"></td>
      <td><input type="number" value="${p.maxCustomers}" data-plan="${p.plan}" data-field="maxCustomers"></td>
      <td><input type="number" value="${p.maxPromos}" data-plan="${p.plan}" data-field="maxPromos"></td>
      <td><select data-plan="${p.plan}" data-field="allowOrders"><option value="true" ${p.allowOrders?'selected':''}>Sí</option><option value="false" ${!p.allowOrders?'selected':''}>No</option></select></td>
      <td><select data-plan="${p.plan}" data-field="allowCustomers"><option value="true" ${p.allowCustomers?'selected':''}>Sí</option><option value="false" ${!p.allowCustomers?'selected':''}>No</option></select></td>
      <td><select data-plan="${p.plan}" data-field="allowMayorista"><option value="true" ${p.allowMayorista?'selected':''}>Sí</option><option value="false" ${!p.allowMayorista?'selected':''}>No</option></select></td>
      <td><select data-plan="${p.plan}" data-field="allowPromos"><option value="true" ${p.allowPromos?'selected':''}>Sí</option><option value="false" ${!p.allowPromos?'selected':''}>No</option></select></td>
      <td><select data-plan="${p.plan}" data-field="catalogOnly"><option value="true" ${p.catalogOnly?'selected':''}>Sí</option><option value="false" ${!p.catalogOnly?'selected':''}>No</option></select></td>
    `;
    tbody.appendChild(tr);
  });
}

async function guardarTodo() {
  const status = document.getElementById("status");
  status.innerHTML = "Guardando cambios...";

  // Aquí deberías enviar los datos a tu Apps Script
  // Por ahora solo mostramos mensaje porque no tienes la acción de guardado
  status.style.background = "#fef3c7";
  status.style.color = "#b45309";
  status.textContent = "✅ Cambios guardados en la tabla (simulado). Falta implementar guardado real en tu Apps Script.";
}

// Cerrar sesión
function logout() {
  if (confirm("¿Cerrar sesión?")) location.reload();
}

// Iniciar
window.onload = () => {};
</script>

</body>
</html>
